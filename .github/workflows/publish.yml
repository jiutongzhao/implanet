name: Publish to PyPI

# Publishes on every GitHub Release (and can be run manually). Uses PyPI
# Trusted Publishing (OIDC) — no API token/secret is stored. The first
# successful run turns the "pending" project on PyPI into a real one.
#
# This must match the PyPI pending-publisher config you registered:
#   owner       : jiutongzhao
#   repository  : implanet
#   workflow    : publish.yml      (this file's name)
#   environment : pypi             (the `environment:` below)

on:
  release:
    types: [published]
  workflow_dispatch:        # allow a manual run from the Actions tab

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write       # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
